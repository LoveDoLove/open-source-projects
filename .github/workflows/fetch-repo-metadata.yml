name: Fetch Repo Metadata

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # daily

permissions:
  contents: write

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run metadata fetch script
        run: node scripts/fetchRepoMetadata.js

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage metadata file
        run: |
          git add public/data/projects.json || true
          # If there are no staged changes, exit successfully to avoid creating empty commits
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

      - name: Commit metadata update
        run: |
          git commit -m "Update public/data/projects.json with latest repo metadata"

      - name: Push update to main branch (force-with-lease)
        env:
          UPDATE_BRANCH: main
        run: |
          # Push the current HEAD to the main branch using --force-with-lease
          git push origin HEAD:refs/heads/${UPDATE_BRANCH} --force-with-lease